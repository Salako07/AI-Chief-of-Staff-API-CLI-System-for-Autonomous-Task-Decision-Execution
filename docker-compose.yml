version: '3.8'

services:
  # PostgreSQL Database - Persistent idempotency & audit logs
  postgres:
    image: postgres:15-alpine
    container_name: ai_chief_postgres
    environment:
      POSTGRES_DB: ai_chief_of_staff
      POSTGRES_USER: ai_chief_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_in_production}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai_chief_user -d ai_chief_of_staff"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Redis - Celery message broker
  redis:
    image: redis:7-alpine
    container_name: ai_chief_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_password}
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # FastAPI Application
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai_chief_api
    ports:
      - "8000:8000"
    environment:
      # Database
      DATABASE_URL: postgresql://ai_chief_user:${POSTGRES_PASSWORD:-change_me_in_production}@postgres:5432/ai_chief_of_staff

      # Redis
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_password}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-redis_password}@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-redis_password}@redis:6379/0

      # OpenAI
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      OPENAI_TEMPERATURE: ${OPENAI_TEMPERATURE:-0.2}

      # Slack (optional)
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}

      # App config
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      API_HOST: 0.0.0.0
      API_PORT: 8000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.api.main:app --host 0.0.0.0 --port 8000
    restart: unless-stopped
    volumes:
      - ./logs:/app/logs
      - ./media_uploads:/tmp/media_uploads

  # Celery Worker (Background execution)
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      # Database
      DATABASE_URL: postgresql://ai_chief_user:${POSTGRES_PASSWORD:-change_me_in_production}@postgres:5432/ai_chief_of_staff

      # Redis
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_password}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-redis_password}@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-redis_password}@redis:6379/0

      # OpenAI
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      OPENAI_TEMPERATURE: ${OPENAI_TEMPERATURE:-0.2}

      # Slack (optional)
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}

      # Worker config
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      CELERY_WORKER_CONCURRENCY: ${CELERY_WORKER_CONCURRENCY:-4}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.workers.worker worker --loglevel=info --concurrency=4
    restart: unless-stopped
    volumes:
      - ./logs:/app/logs
      - ./media_uploads:/tmp/media_uploads

  # Flower - Celery monitoring dashboard
  flower:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai_chief_flower
    ports:
      - "5555:5555"
    environment:
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-redis_password}@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-redis_password}@redis:6379/0
      DATABASE_URL: postgresql://ai_chief_user:${POSTGRES_PASSWORD:-change_me_in_production}@postgres:5432/ai_chief_of_staff
    depends_on:
      redis:
        condition: service_healthy
    command: celery -A app.workers.worker flower --port=5555
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  default:
    name: ai_chief_network
